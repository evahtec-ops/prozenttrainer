name: Build Check

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "🔍 Checking files..."
          test -f index.html || (echo "❌ index.html fehlt!" && exit 1)

      - name: Basic HTML check
        run: |
          echo "🔍 Checking HTML..."
          grep -q "<html" index.html || echo "⚠️ HTML check übersprungen"

      - name: Optional Live Check (no fail)
        run: |
          echo "🌐 Checking site..."
          curl -I https://evahtec-ops.github.io/prozenttrainer/ || echo "⚠️ Site evtl. noch nicht live"

      - name: Done
        run: echo "✅ Build erfolgreich"