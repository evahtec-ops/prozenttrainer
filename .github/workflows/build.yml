name: Build Check

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Check index.html existiert
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html fehlt!"
            exit 1
          fi

      - name: Check wichtige Dateien
        run: |
          test -f index.html
          test -f highscores.php
          test -f save_score.php

      - name: Erfolg
        run: echo "✅ Build erfolgreich"